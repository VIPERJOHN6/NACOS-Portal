<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Payment Successful</title>

</head>

<body>

  <h1>Payment Successful 🎉</h1>

  <p>Recording your votes...</p>

  <script>

    async function saveVotes() {

      const votes =
        JSON.parse(
          localStorage.getItem('pendingVotes')
        ) || [];

      if (!votes.length) {

        document.body.innerHTML =
          '<h2>No pending votes found.</h2>';

        return;

      }

      try {

        const response = await fetch(
          '/.netlify/functions/votes',
          {

            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({ votes })

          }
        );

        const data = await response.json();

        console.log(data);

        localStorage.removeItem('pendingVotes');

        document.body.innerHTML = `
          <h1>Votes Recorded Successfully ✅</h1>
          <p>Redirecting to dashboard...</p>
        `;

        setTimeout(() => {

          window.location.href =
            '/index.html#evoting';

        }, 3000);

      } catch (error) {

        console.error(error);

        document.body.innerHTML = `
          <h1>Something went wrong ❌</h1>
        `;

      }

    }

    saveVotes();

  </script>

</body>

</html>
