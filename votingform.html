              <option value="">Select candidate</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Vote amount</label>

        <!-- Best Dressed Male of the Faculty -->

          <div class="col-md-4">

          </div>

      </form>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <script>
    async function loadCandidateOptions() {
      if (!window.supabase) {
        console.error('Supabase client not initialized');
        return;
      }

      const defaultCandidates = {
        'tech-innovator': [
          'Akinlotan Victor',
          'Ajetomobi praise',
          'Samuel',
          'Nabeel'
        ],
        'faculty-icon': [
          'Hayat',
          'Father KD',
          'Eri',
          'Ajetomobi praise'
        ],
        'sportsman': [
          'Al Amen',
          'Williams',
          'Ibadan',
          'Father KD'
        ],
        'course-rep': [
          'Henry',
          'Faiz',
          'Daniel',
          'Michael'
        ],
        'best-dressed-male': [
          'Tech Kingsley',
          'Siraj',
          'Quayum',
          'Femi'
        ],
        'best-dressed-female': [
          'Stephanie',
          'Daniella',
          'Khadijah',
          'Ike Oluwa'
        ],
        'most-influential': [
          'KD',
          'Femi',
          'Siraj',
          'Henry'
        ],
        'outstanding-executive': [
          'Hayat',
          'Praise',
          'Stephanie',
          'Daniella'
        ],
        'most-popular': [
          'Siraj',
          'KD',
          'Femi',
          'Ibadan'
        ],
        'programmer-of-the-year': [
          'Akinlotan Victor',
          'Eri',
          'Phillip success',
          'Tech Kingsley'
        ]
      };

      const selects = document.querySelectorAll('.candidate-select');
      for (const select of selects) {
        const category = select.dataset.category;
        if (!category) continue;

        const { data, error } = await window.supabase
          .from('votes')
          .select('candidate_name')
          .eq('category', category)
          .order('candidate_name', { ascending: true });

        if (error) {
          console.error('Error loading candidate options for', category, error);
          continue;
        }

        const dbNames = [...new Set((data || []).map(row => row.candidate_name).filter(Boolean))];
        const defaultNames = defaultCandidates[category] || [];
        const names = [...new Set([...defaultNames, ...dbNames])];

        const options = ['<option value="">Select candidate</option>'];
        names.forEach((name) => {
          options.push(`<option value="${name}">${name}</option>`);
        });

        select.innerHTML = options.join('');
      }
    }

    document.addEventListener('DOMContentLoaded', loadCandidateOptions);
  </script>
  <script type="module">
    import submitVotes from './js/submit-votes.js';

    const votingForm = document.getElementById('votingForm');

    votingForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(votingForm);
      const result = await submitVotes(formData);

      if (result.success) {
        // Show success message
        alert(result.message);
        // Redirect to index page
        window.location.href = result.redirect;
      } else {
        // Show error message
        alert(result.message);
      }
    });
  </script>

</body>

</html>
